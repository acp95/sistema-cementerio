<div class="card">
    <p-toast />
    <p-toolbar styleClass="mb-6">
        <ng-template #start>
            <p-button label="Nuevo" icon="pi pi-plus" class="mr-2" (onClick)="openNew()"
                *ngIf="authService.hasPermission('crear_roles')" />
        </ng-template>

        <ng-template #end>
            <p-button label="Excel" icon="pi pi-file-excel" severity="success" class="mr-2" (onClick)="exportExcel()" />
            <p-button label="PDF" icon="pi pi-file-pdf" severity="danger" class="mr-2" (onClick)="exportPdf()" />
        </ng-template>
    </p-toolbar>

    <p-table #dt [value]="roles" [rows]="10" [paginator]="true" [globalFilterFields]="['nombre', 'descripcion']"
        [tableStyle]="{ 'min-width': '75rem' }" 
        [rowHover]="true" 
        dataKey="id"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} roles de sistema" 
        [showCurrentPageReport]="true"
        styleClass="p-datatable-modern">
        
        <ng-template #caption>
            <div class="flex items-center justify-between pb-4">
                <div class="flex items-center gap-3">
                    <div class="p-3 bg-red-100 rounded-xl">
                        <i class="pi pi-shield text-red-600 text-2xl"></i>
                    </div>
                    <div>
                        <h5 class="m-0 text-xl font-bold tracking-tight">Roles y Seguridad</h5>
                        <p class="text-sm text-gray-500 m-0">Niveles de acceso y permisos del sistema</p>
                    </div>
                </div>
                <p-iconfield styleClass="w-80">
                    <p-inputicon styleClass="pi pi-search" />
                    <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Buscar roles..." class="w-full rounded-xl border-gray-200" />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template #header>
            <tr>
                <th pSortableColumn="nombre" style="min-width:18rem">
                    Nombre del Rol <p-sortIcon field="nombre" />
                </th>
                <th pSortableColumn="descripcion" style="min-width:25rem">
                    Descripción / Funciones <p-sortIcon field="descripcion" />
                </th>
                <th pSortableColumn="activo" style="width: 130px">
                    Estado <p-sortIcon field="activo" />
                </th>
                <th style="width: 200px" class="text-center">Acciones</th>
            </tr>
        </ng-template>

        <ng-template #body let-rol>
            <tr [ngClass]="{'opacity-60 bg-gray-50': !rol.activo}">
                <td>
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-gray-100 rounded-lg">
                            <i class="pi pi-briefcase text-gray-500"></i>
                        </div>
                        <span class="font-bold text-gray-800 tracking-tight text-lg">{{ rol.nombre }}</span>
                    </div>
                </td>
                <td>
                    <span class="text-sm text-gray-600 leading-relaxed">{{ rol.descripcion || 'Sin descripción detallada' }}</span>
                </td>
                <td>
                    <span class="status-badge" [ngClass]="rol.activo ? 'status-active' : 'status-annulled'">
                        {{ rol.activo ? 'ACTIVO' : 'INACTIVO' }}
                    </span>
                </td>
                <td>
                    <div class="action-buttons justify-center">
                        <p-button icon="pi pi-key" [rounded]="true" [text]="true" severity="info"
                            pTooltip="Configurar Permisos" (click)="openPermissionsDialog(rol)"
                            *ngIf="authService.hasPermission('actualizar_roles')" />
                        
                        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true"
                             (click)="editRol(rol)" pTooltip="Editar información"
                            *ngIf="authService.hasPermission('actualizar_roles')" />
                        
                        <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true"
                            (click)="deleteRol(rol)" *ngIf="authService.hasPermission('eliminar_roles')" 
                            pTooltip="Eliminar permanentemente" />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr>
                <td colspan="4" class="text-center py-8">
                    <i class="pi pi-lock-open text-3xl text-gray-300 block mb-3"></i>
                    <span class="text-gray-500">No se encontraron roles definidos.</span>
                </td>
            </tr>
        </ng-template>
    </p-table>

    <p-dialog [(visible)]="rolDialog" [style]="{ width: '450px', maxWidth: '95vw' }" header="Detalles del Rol" [modal]="true"
        class="p-fluid">
        <ng-template #content>
            <div class="flex flex-col gap-6">
                <!-- Nombre -->
                <div>
                    <label for="nombre" class="block font-bold mb-3">Nombre</label>
                    <input type="text" pInputText id="nombre" [(ngModel)]="rol.nombre" required autofocus fluid />
                    <small class="text-red-500" *ngIf="submitted && !rol.nombre">Nombre es requerido.</small>
                </div>

                <!-- Descripcion -->
                <div>
                    <label for="descripcion" class="block font-bold mb-3">Descripción</label>
                    <textarea id="descripcion" pTextarea [(ngModel)]="rol.descripcion" rows="3" cols="20"
                        fluid></textarea>
                </div>

                <!-- Activo aka Estado -->
                <!-- Note: Based on backend entity, it's boolean 'activo'. -->
            </div>
        </ng-template>

        <ng-template #footer>
            <p-button label="Cancelar" icon="pi pi-times" text (click)="hideDialog()" />
            <p-button label="Guardar" icon="pi pi-check" (click)="saveRol()" />
        </ng-template>
    </p-dialog>

    <p-confirmDialog [style]="{ width: '450px', maxWidth: '95vw' }" />

    <!-- Matrix Permissions Dialog -->
    <app-role-permissions-dialog [(visible)]="permissionsDialogVisible" [rol]="selectedRolForPermissions"
        (saved)="loadRoles()" />
</div>
