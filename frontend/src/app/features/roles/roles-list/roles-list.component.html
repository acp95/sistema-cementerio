<div class="card">
    <p-toast />
    <p-toolbar styleClass="mb-6">
        <ng-template #start>
            <p-button label="Nuevo" icon="pi pi-plus" class="mr-2" (onClick)="openNew()"
                *ngIf="authService.hasPermission('crear_roles')" />
        </ng-template>

        <ng-template #end>
            <p-button label="Excel" icon="pi pi-file-excel" severity="success" class="mr-2" (onClick)="exportExcel()" />
            <p-button label="PDF" icon="pi pi-file-pdf" severity="danger" class="mr-2" (onClick)="exportPdf()" />
        </ng-template>
    </p-toolbar>

    <p-table #dt [value]="roles" [rows]="10" [paginator]="true" [globalFilterFields]="['nombre', 'descripcion']"
        [tableStyle]="{ 'min-width': '75rem' }" [rowHover]="true" dataKey="id"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} roles" [showCurrentPageReport]="true">
        <ng-template #caption>
            <div class="flex items-center justify-between">
                <h5 class="m-0">Gestión de Roles</h5>
                <p-iconfield>
                    <p-inputicon styleClass="pi pi-search" />
                    <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Buscar..." />
                </p-iconfield>
            </div>
        </ng-template>
        <ng-template #header>
            <tr>
                <th pSortableColumn="nombre" style="min-width:14rem">
                    Nombre <p-sortIcon field="nombre" />
                </th>
                <th pSortableColumn="descripcion">
                    Descripción <p-sortIcon field="descripcion" />
                </th>
                <th pSortableColumn="activo">
                    Estado <p-sortIcon field="activo" />
                </th>
                <th style="min-width: 12rem"></th>
            </tr>
        </ng-template>
        <ng-template #body let-rol>
            <tr>
                <td>{{ rol.nombre }}</td>
                <td>{{ rol.descripcion || '-' }}</td>
                <td>
                    <p-tag [value]="rol.activo ? 'ACTIVO' : 'INACTIVO'"
                        [severity]="rol.activo ? 'success' : 'danger'" />
                </td>
                <td>
                    <p-button icon="pi pi-key" class="mr-2" [rounded]="true" [outlined]="true" severity="info"
                        pTooltip="Permisos" (click)="openPermissionsDialog(rol)"
                        *ngIf="authService.hasPermission('actualizar_roles')" />
                    <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" (click)="editRol(rol)"
                        *ngIf="authService.hasPermission('actualizar_roles')" />
                    <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
                        (click)="deleteRol(rol)" *ngIf="authService.hasPermission('eliminar_roles')" />
                </td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr>
                <td colspan="4" class="text-center">No se encontraron roles.</td>
            </tr>
        </ng-template>
    </p-table>

    <p-dialog [(visible)]="rolDialog" [style]="{ width: '450px' }" header="Detalles del Rol" [modal]="true"
        class="p-fluid">
        <ng-template #content>
            <div class="flex flex-col gap-6">
                <!-- Nombre -->
                <div>
                    <label for="nombre" class="block font-bold mb-3">Nombre</label>
                    <input type="text" pInputText id="nombre" [(ngModel)]="rol.nombre" required autofocus fluid />
                    <small class="text-red-500" *ngIf="submitted && !rol.nombre">Nombre es requerido.</small>
                </div>

                <!-- Descripcion -->
                <div>
                    <label for="descripcion" class="block font-bold mb-3">Descripción</label>
                    <textarea id="descripcion" pTextarea [(ngModel)]="rol.descripcion" rows="3" cols="20"
                        fluid></textarea>
                </div>

                <!-- Activo aka Estado -->
                <!-- Note: Based on backend entity, it's boolean 'activo'. -->
            </div>
        </ng-template>

        <ng-template #footer>
            <p-button label="Cancelar" icon="pi pi-times" text (click)="hideDialog()" />
            <p-button label="Guardar" icon="pi pi-check" (click)="saveRol()" />
        </ng-template>
    </p-dialog>

    <p-confirmDialog [style]="{ width: '450px' }" />

    <!-- Matrix Permissions Dialog -->
    <app-role-permissions-dialog [(visible)]="permissionsDialogVisible" [rol]="selectedRolForPermissions"
        (saved)="loadRoles()" />
</div>
