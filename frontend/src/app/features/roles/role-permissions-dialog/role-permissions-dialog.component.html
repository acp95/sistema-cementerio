<p-toast />

<p-dialog [(visible)]="visible" [style]="{ width: '800px' }" [header]="'Permisos del Rol: ' + (rol?.nombre || '')"
    [modal]="true" [closable]="true" (onShow)="onVisibleChange(true)" (visibleChange)="visibleChange.emit($event)">
    <ng-template #content>
        <div class="permissions-matrix">
            <p-table [value]="permisosMatrix" [loading]="loading" styleClass="p-datatable-sm">
                <ng-template #header>
                    <tr>
                        <th style="width: 50px">#</th>
                        <th style="min-width: 150px">Módulo</th>
                        <th class="text-center" style="width: 100px">Ver</th>
                        <th class="text-center" style="width: 100px">Crear</th>
                        <th class="text-center" style="width: 100px">Actualizar</th>
                        <th class="text-center" style="width: 100px">Eliminar</th>
                    </tr>
                </ng-template>
                <ng-template #body let-row let-i="rowIndex">
                    <tr>
                        <td>{{ i + 1 }}</td>
                        <td>{{ row.modulo.nombre }}</td>
                        <td class="text-center">
                            <p-toggleSwitch [(ngModel)]="row.ver" />
                        </td>
                        <td class="text-center">
                            <p-toggleSwitch [(ngModel)]="row.crear" />
                        </td>
                        <td class="text-center">
                            <p-toggleSwitch [(ngModel)]="row.actualizar" />
                        </td>
                        <td class="text-center">
                            <p-toggleSwitch [(ngModel)]="row.eliminar" />
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </ng-template>

    <ng-template #footer>
        <div class="flex justify-center gap-2">
            <p-button label="Guardar" icon="pi pi-check" severity="success" (onClick)="save()" [loading]="loading" />
            <p-button label="Salir" icon="pi pi-sign-out" severity="danger" [outlined]="true" (onClick)="close()" />
        </div>
    </ng-template>
</p-dialog>
