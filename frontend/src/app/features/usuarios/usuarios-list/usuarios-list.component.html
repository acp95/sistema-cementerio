<div class="card">
    <p-toast />
    <p-toolbar styleClass="mb-6">
        <ng-template #start>
            <p-button label="Nuevo" icon="pi pi-plus" class="mr-2" (onClick)="openNew()"
                *ngIf="authService.hasPermission('crear_usuarios')" />
        </ng-template>

        <ng-template #end>
            <p-button label="Excel" icon="pi pi-file-excel" severity="success" class="mr-2" (onClick)="exportExcel()" />
            <p-button label="PDF" icon="pi pi-file-pdf" severity="danger" class="mr-2" (onClick)="exportPdf()" />
        </ng-template>
    </p-toolbar>

    <p-table #dt [value]="usuarios" [rows]="10" [paginator]="true"
        [globalFilterFields]="['username', 'nombreCompleto', 'email']" [tableStyle]="{ 'min-width': '75rem' }"
        [rowHover]="true" dataKey="id" currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} usuarios"
        [showCurrentPageReport]="true">
        <ng-template #caption>
            <div class="flex items-center justify-between">
                <h5 class="m-0">Gestión de Usuarios</h5>
                <p-iconfield>
                    <p-inputicon styleClass="pi pi-search" />
                    <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Buscar..." />
                </p-iconfield>
            </div>
        </ng-template>
        <ng-template #header>
            <tr>
                <th pSortableColumn="username" style="min-width:14rem">
                    Usuario <p-sortIcon field="username" />
                </th>
                <th pSortableColumn="nombreCompleto" style="min-width:14rem">
                    Nombre Completo <p-sortIcon field="nombreCompleto" />
                </th>
                <th pSortableColumn="email">
                    Email <p-sortIcon field="email" />
                </th>
                <th pSortableColumn="rol.nombre">
                    Rol <p-sortIcon field="rol.nombre" />
                </th>
                <th pSortableColumn="activo">
                    Estado <p-sortIcon field="activo" />
                </th>
                <th style="min-width: 12rem"></th>
            </tr>
        </ng-template>
        <ng-template #body let-usuario>
            <tr>
                <td>{{ usuario.username }}</td>
                <td>{{ usuario.nombreCompleto }}</td>
                <td>{{ usuario.email || '-' }}</td>
                <td>{{ usuario.rol?.nombre || '-' }}</td>
                <td>
                    <p-tag [value]="usuario.activo ? 'ACTIVO' : 'INACTIVO'"
                        [severity]="usuario.activo ? 'success' : 'danger'" />
                </td>
                <td>
                    <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true"
                        (click)="editUsuario(usuario)" *ngIf="authService.hasPermission('actualizar_usuarios')" />
                    <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
                        (click)="deleteUsuario(usuario)" *ngIf="authService.hasPermission('eliminar_usuarios')" />
                </td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr>
                <td colspan="6" class="text-center">No se encontraron usuarios.</td>
            </tr>
        </ng-template>
    </p-table>

    <p-dialog [(visible)]="usuarioDialog" [style]="{ width: '450px' }" header="Detalles del Usuario" [modal]="true"
        class="p-fluid">
        <ng-template #content>
            <div class="flex flex-col gap-6">
                <!-- Username -->
                <div>
                    <label for="username" class="block font-bold mb-3">Usuario</label>
                    <input type="text" pInputText id="username" [(ngModel)]="usuario.username" required autofocus
                        fluid />
                    <small class="text-red-500" *ngIf="submitted && !usuario.username">Usuario es requerido.</small>
                </div>

                <!-- Nombre Completo -->
                <div>
                    <label for="nombreCompleto" class="block font-bold mb-3">Nombre Completo</label>
                    <input type="text" pInputText id="nombreCompleto" [(ngModel)]="usuario.nombreCompleto" fluid />
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block font-bold mb-3">Email</label>
                    <input type="text" pInputText id="email" [(ngModel)]="usuario.email" fluid />
                </div>

                <!-- Password (create only mostly) -->
                <div>
                    <label for="password" class="block font-bold mb-3">Contraseña</label>
                    <p-password id="password" [(ngModel)]="usuario.password" [feedback]="false" toggleMask
                        fluid></p-password>
                    <small class="text-gray-500" *ngIf="usuario.id">Dejar vacío para mantener la actual.</small>
                </div>

                <!-- Rol -->
                <div>
                    <label for="rolId" class="block font-bold mb-3">Rol</label>
                    <p-select id="rolId" name="rolId" [(ngModel)]="usuario.rolId" [options]="roles" optionLabel="nombre"
                        optionValue="id" placeholder="Seleccione Rol" [filter]="true" appendTo="body"
                        styleClass="w-full" />
                    <small class="text-red-500" *ngIf="submitted && !usuario.rolId">Rol es requerido.</small>
                </div>

                <!-- Activo aka Estado -->
                <!-- Boolean toggle could be added here if needed, defaults true for new -->
            </div>
        </ng-template>

        <ng-template #footer>
            <p-button label="Cancelar" icon="pi pi-times" text (click)="hideDialog()" />
            <p-button label="Guardar" icon="pi pi-check" (click)="saveUsuario()" />
        </ng-template>
    </p-dialog>

    <p-confirmDialog [style]="{ width: '450px' }" />
</div>
